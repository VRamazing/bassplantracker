<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bass Guitar — 90 Day Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f2eb;--ink:#1a1814;--ink2:#3d3a34;--ink3:#7a7570;
  --rule:#ddd9d0;--ph1:#c8441a;--ph2:#1a6bc8;--ph3:#1a9e5a;
  --accent:#c8441a;--card:#fff;--hover:#faf8f4;--tag:#ede9e0;
  --done-bg:#f0faf4;--done-c:#1a9e5a;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:'Syne',sans-serif;min-height:100vh;}

/* ── HERO ── */
.hero{padding:16px 24px 16px;border-bottom:2px solid var(--ink);background:var(--ink);color:#fff;}
.hero-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#666;margin-bottom:12px;}
.hero-title{font-size:clamp(24px, 5vw, 40px);font-weight:800;line-height:0.92;letter-spacing:-2px;}
.hero-title em{font-style:normal;color:var(--accent);}
.hero-meta{margin-top:10px;display:flex;gap:24px;flex-wrap:wrap;}
.meta-item{display:flex;flex-direction:column;gap:2px;}
.meta-val{font-size:clamp(22px,5vw,30px);font-weight:700;line-height:1;color:var(--accent);}
.meta-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#666;}
.hero-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid #2a2824;}
.legend-row{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#888;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── GLOBAL PROGRESS ── */
.global-prog{background:#111;padding:10px 24px;display:flex;align-items:center;gap:12px;}
.gp-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#555;white-space:nowrap;}
.gp-bar{flex:1;height:3px;background:#2a2824;border-radius:2px;overflow:hidden;min-width:60px;}
.gp-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.gp-pct{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--accent);white-space:nowrap;min-width:32px;text-align:right;}
.gp-count{font-family:'JetBrains Mono',monospace;font-size:9px;color:#555;white-space:nowrap;}

/* ── TOOLBAR ── */
.toolbar{position:sticky;top:0;z-index:100;background:var(--ink);border-bottom:1px solid #2a2824;display:flex;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.toolbar::-webkit-scrollbar{height:0;}
.phase-tab{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:13px 16px;cursor:pointer;color:#555;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.phase-tab:hover{color:#aaa;}
.phase-tab.active{color:#fff;border-bottom-color:var(--accent);}
.search-wrap{margin-left:auto;padding:0 16px;flex-shrink:0;}
.search-input{background:#1a1814;border:1px solid #2a2824;color:#fff;font-family:'JetBrains Mono',monospace;font-size:10px;padding:6px 12px;outline:none;width:140px;border-radius:2px;}
.search-input::placeholder{color:#444;}
.search-input:focus{border-color:var(--accent);}

/* ── LAYOUT ── */
.layout{display:block;}

/* ── SIDEBAR ── */











/* ── CONTENT ── */
.content{min-width:0;}

/* ── PHASE DIVIDER ── */
.phase-div{padding:32px 24px 24px;background:var(--ink);color:#fff;scroll-margin-top:42px;}
.phase-div-num{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:6px;}
.phase-div-title{font-size:clamp(22px,5vw,32px);font-weight:800;letter-spacing:-0.5px;line-height:1;}
.phase-div-desc{margin-top:8px;font-size:12px;color:#777;line-height:1.55;max-width:520px;}
.phase-div-days{font-family:'JetBrains Mono',monospace;font-size:clamp(28px,6vw,44px);font-weight:300;color:#222;line-height:1;margin-top:6px;}

/* ── WEEK BLOCK ── */
.week-block{border-bottom:1px solid var(--rule);scroll-margin-top:42px;}
.week-header{padding:20px 24px 16px;background:var(--card);cursor:pointer;user-select:none;display:flex;align-items:flex-start;gap:12px;}
.week-header:hover{background:var(--hover);}
.week-header-left{flex:1;min-width:0;}
.week-num{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.week-title{font-size:clamp(16px,4vw,20px);font-weight:700;letter-spacing:-0.3px;margin-bottom:8px;}
.week-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.wtag{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;background:var(--tag);color:var(--ink2);border-radius:2px;}
.week-prog-row{display:flex;align-items:center;gap:8px;}
.week-prog-bar{height:2px;background:var(--rule);flex:1;border-radius:2px;overflow:hidden;}
.week-prog-fill{height:100%;background:var(--done-c);border-radius:2px;transition:width .3s;}
.week-prog-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--ink3);white-space:nowrap;}
.week-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.phase-badge{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:2px;color:#fff;white-space:nowrap;}
.chevron{font-size:18px;color:var(--ink3);transition:transform .2s;line-height:1;}
.week-header.open .chevron{transform:rotate(90deg);}
.week-body{display:none;}
.week-body.open{display:block;}

/* ── WEEK SUMMARY ── */
.week-summary{padding:12px 24px;background:var(--bg);border-bottom:1px solid var(--rule);display:flex;gap:20px;flex-wrap:wrap;}
.sum-block{display:flex;flex-direction:column;gap:2px;}
.sum-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);}
.sum-val{font-size:12px;font-weight:600;color:var(--ink2);}
.song-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 7px;border:1px solid var(--rule);background:var(--card);border-radius:2px;}
.band-pip{width:5px;height:5px;border-radius:50%;}

/* ── DAYS ── */
.days-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.days-grid{display:grid;grid-template-columns:repeat(7,minmax(150px,1fr));border-bottom:1px solid var(--rule);}
.day-col{border-right:1px solid var(--rule);padding:16px 12px;min-width:150px;}
.day-col:last-child{border-right:none;}
.day-col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .day-col-hd { cursor: pointer; user-select: none; }
  .day-col-hd:hover { opacity: 0.8; }
  .day-col-body { display: none; margin-top: 10px; }
  .day-col.open .day-col-body { display: block; }
  .day-chevron { font-size: 14px; transition: transform 0.2s; margin-left: auto; margin-right: 10px; color: var(--fg); opacity:0.5; }
  .day-col.open .day-chevron { transform: rotate(90deg); }

.day-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);}
.day-done-badge{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:1px;padding:2px 5px;background:var(--done-c);color:#fff;border-radius:2px;display:none;}
.day-col.all-done{background:var(--done-bg);}
.day-col.all-done .day-done-badge{display:inline-block;}
.day-col.all-done .day-num{color:var(--done-c);}
.day-num{font-size:clamp(16px,4vw,20px);font-weight:800;line-height:1;margin-bottom:10px;}
.day-rest{border-right:1px solid var(--rule);padding:16px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;opacity:.35;min-width:80px;}
.rest-icon{font-size:18px;}
.rest-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--ink3);}
.rest-day{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--ink3);margin-top:2px;}

/* ── PRACTICE ITEM ── */
.practice-item{margin-bottom:6px;padding:7px 9px;background:var(--bg);border-left:2px solid var(--rule);border-radius:0 2px 2px 0;transition:opacity .15s;}
.practice-item.checked-item{opacity:.45;}
.practice-item.checked-item .p-text{text-decoration:line-through;text-decoration-color:var(--ink3);}
.p-cat{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
.item-check{display:flex;align-items:flex-start;gap:7px;cursor:pointer;}
.item-checkbox{appearance:none;-webkit-appearance:none;width:13px;height:13px;border:1.5px solid var(--rule);background:var(--card);cursor:pointer;flex-shrink:0;margin-top:1px;transition:all .15s;border-radius:2px;position:relative;}
.item-checkbox:checked{background:var(--accent);border-color:var(--accent);}
.item-checkbox:checked::after{content:'';position:absolute;left:3px;top:-1px;width:4px;height:8px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);}
.item-content{flex:1;min-width:0;}
.p-text{font-weight:600;font-size:11px;line-height:1.35;}
.p-detail{font-size:10px;color:var(--ink3);margin-top:2px;line-height:1.4;}
.resource-link{display:inline-flex;align-items:center;gap:3px;margin-top:3px;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--ph2);text-decoration:none;opacity:.8;transition:opacity .15s;word-break:break-all;}
.resource-link:hover{opacity:1;text-decoration:underline;}
.resource-link::before{content:'↗';font-size:8px;flex-shrink:0;}
.cat-warmup{border-left-color:#f0a500;}.cat-warmup .p-cat{color:#f0a500;}
.cat-technique{border-left-color:var(--ph2);}.cat-technique .p-cat{color:var(--ph2);}
.cat-theory{border-left-color:#8b1ac8;}.cat-theory .p-cat{color:#8b1ac8;}
.cat-song{border-left-color:var(--ph3);}.cat-song .p-cat{color:var(--ph3);}
.cat-groove{border-left-color:var(--ph1);}.cat-groove .p-cat{color:var(--ph1);}

/* ── NO RESULTS ── */
.no-results{padding:60px 24px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink3);}

/* ── MOBILE ── */
@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  
  .hero{padding:16px;}
  .hero-meta{gap:16px;}
  .meta-val{font-size:24px;}
  .global-prog{padding:10px 16px;gap:10px;}
  .gp-count{display:none;}
  .toolbar{padding:0;}
  .phase-tab{padding:14px 12px;font-size:10px;}
  .search-wrap{padding:0 12px;}
  .search-input{width:120px;}
  .phase-div{padding:28px 16px 20px;}
  
  .week-header{padding:16px;flex-direction:column;gap:10px;}
  .week-header-left{width:100%;}
  .week-header-right{width:100%;flex-direction:row-reverse;justify-content:space-between;align-items:center;margin-top:4px;}
  
  .week-summary{padding:12px 16px;gap:12px;display:grid;grid-template-columns:1fr 1fr;}
  
  .days-wrap{overflow-x:visible;}
  .days-grid{grid-template-columns:1fr;border-bottom:none;}
  .day-col{padding:16px;min-width:0;border-right:none;border-bottom:1px solid var(--rule);}
  .day-col:last-child{border-bottom:1px solid var(--rule);}
  .day-rest{padding:20px;min-width:0;border-right:none;border-bottom:1px solid var(--rule);flex-direction:row;justify-content:flex-start;gap:12px;}
  .rest-day{margin-top:0;}
  
  .practice-item{padding:10px;margin-bottom:8px;}
  .item-check{gap:10px;}
  .item-checkbox{width:16px;height:16px;}
  .item-checkbox:checked::after{left:4.5px;top:0px;width:4.5px;height:9px;}
  .p-text{font-size:13px;}
  .p-detail{font-size:11px;}
  .resource-link{font-size:9px;}
}

@media(max-width:480px){
  .hero-title{font-size:28px;}
  .phase-tab{padding:12px 10px;font-size:9px;}
  .search-input{width:100px;font-size:10px;}
  .week-summary{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-eyebrow">Kaizen Bass Program · 90 Days</div>
  <div class="hero-title">BASS <em>GUITAR</em> PLANNER</div>
  <div class="hero-meta">
    <div class="meta-item"><div class="meta-val">90</div><div class="meta-lbl">Days</div></div>
    <div class="meta-item"><div class="meta-val">3</div><div class="meta-lbl">Phases</div></div>
    <div class="meta-item"><div class="meta-val">13</div><div class="meta-lbl">Weeks</div></div>
    <div class="meta-item"><div class="meta-val">23+</div><div class="meta-lbl">Songs</div></div>
  </div>
  <div class="hero-legend">
    <div class="legend-row"><div class="legend-dot" style="background:var(--ph1)"></div>Phase I — Groove Foundation</div>
    <div class="legend-row"><div class="legend-dot" style="background:var(--ph2)"></div>Phase II — Song Mastery</div>
    <div class="legend-row"><div class="legend-dot" style="background:var(--ph3)"></div>Phase III — Performance</div>
  </div>
</div>

<div class="global-prog">
  <span class="gp-label">Progress</span>
  <div class="gp-bar"><div class="gp-fill" id="gp-fill" style="width:0%"></div></div>
  <span class="gp-pct" id="gp-pct">0%</span>
  <span class="gp-count" id="gp-count">0 / 0 tasks</span>
</div>

<div class="toolbar">
  <button class="phase-tab active" onclick="filterPhase('all',this)">All</button>
  <button class="phase-tab" onclick="filterPhase('I',this)">Phase I</button>
  <button class="phase-tab" onclick="filterPhase('II',this)">Phase II</button>
  <button class="phase-tab" onclick="filterPhase('III',this)">Phase III</button>
  <div class="search-wrap" style="display:flex;gap:8px;align-items:center;">
    <button onclick="exportData()" style="background:#2a2824;color:#fff;border:none;padding:6px 10px;font-family:monospace;font-size:9px;cursor:pointer;border-radius:2px;">Export Save</button>
    <button onclick="importData()" style="background:#2a2824;color:#fff;border:none;padding:6px 10px;font-family:monospace;font-size:9px;cursor:pointer;border-radius:2px;">Import Save</button>
    <input class="search-input" placeholder="Search…" oninput="doSearch(this.value)" id="search-box">
  </div>
</div>

<div class="layout">
  
  <div class="content" id="content"></div>
</div>

<script>

function exportData() {
  const data = localStorage.getItem(SK) || '{}';
  const encoded = btoa(data); // Simple base64 encode
  navigator.clipboard.writeText(encoded).then(() => {
    alert("Save Code copied to clipboard! Paste this on your other device.");
  });
}
function importData() {
  const code = prompt("Paste your Save Code here:");
  if (code) {
    try {
      const decoded = atob(code);
      JSON.parse(decoded); // validate JSON
      localStorage.setItem(SK, decoded);
      location.reload();
    } catch(e) {
      alert("Invalid Save Code.");
    }
  }
}

// STORAGE
// ═══════════════════════════════════════════════════════
const SK = 'bass90_checks_v2';
function loadChecks(){ try{ return JSON.parse(localStorage.getItem(SK)||'{}'); }catch(e){ return {}; } }
function saveCheck(k,v){ const c=loadChecks(); c[k]=v; localStorage.setItem(SK,JSON.stringify(c)); }
function ckKey(wid,di,ii){ return `${wid}_d${di}_i${ii}`; }

function updateGlobalProg(){
  let total=0,done=0;
  const c=loadChecks();
  plan.forEach(w=>w.days.forEach(d=>d.items.forEach((_,ii)=>{ total++; })));
  plan.forEach(w=>w.days.forEach((d,di)=>d.items.forEach((_,ii)=>{ if(c[ckKey(w.id,di,ii)]) done++; })));
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('gp-fill').style.width=pct+'%';
  document.getElementById('gp-pct').textContent=pct+'%';
  const gc=document.getElementById('gp-count');
  if(gc) gc.textContent=`${done} / ${total} tasks`;
}

// ═══════════════════════════════════════════════════════
// HANDLERS
// ═══════════════════════════════════════════════════════
function onCheck(key,dayColId,weekId){
  const cb=document.getElementById('cb-'+key);
  saveCheck(key,cb.checked);
  cb.closest('.practice-item').classList.toggle('checked-item',cb.checked);
  refreshDayCol(dayColId);
  refreshWeekProg(weekId);
  updateGlobalProg();
}

function refreshDayCol(id){
  const col=document.getElementById(id);
  if(!col) return;
  const boxes=col.querySelectorAll('.item-checkbox');
  const done=[...boxes].filter(b=>b.checked).length;
  col.classList.toggle('all-done',done===boxes.length&&boxes.length>0);
}

function refreshWeekProg(wid){
  const el=document.getElementById(wid);
  if(!el) return;
  const boxes=el.querySelectorAll('.item-checkbox');
  const done=[...boxes].filter(b=>b.checked).length;
  const total=boxes.length;
  const f=el.querySelector('.week-prog-fill');
  const l=el.querySelector('.week-prog-lbl');
  if(f) f.style.width=total?Math.round(done/total*100)+'%':'0%';
  if(l) l.textContent=`${done}/${total}`;
  
}

        w.tags.some(t=>t.toLowerCase().includes(s))||

                    <input type="checkbox" class="item-checkbox" id="cb-${key}" ${chk?'checked':''} onchange="onCheck('${key}','${dcid}','${w.id}')">
                    <div class="item-content">
                      <div class="p-text">${item.text}</div>
                      ${item.detail?`<div class="p-detail">${item.detail}</div>`:''}
                      ${res?`<a class="resource-link" href="${res.u}" target="_blank" rel="noopener">${res.l}</a>`:''}
                    </div>
                  </label>
                </div>`;
              }).join('')}
            </div>`;
          }).join('')}
          <div class="day-rest">
            <div class="rest-icon">☽</div>
            <div class="rest-lbl">Rest</div>
            <div class="rest-day">Day ${wDayStart+6}</div>
          </div>
        </div></div>
      </div>
    </div>`;

    dayNum+=7;
  });

  if(!html.includes('week-block')) html=`<div class="no-results">No results for "${search}"</div>`;
  content.innerHTML=html;
  updateGlobalProg();
}

function toggleWeek(hdr,id){
  // accordion style
  const body = document.getElementById('body-'+id);
  const isOpening = !body.classList.contains('open');
  document.querySelectorAll('.week-header.open').forEach(h => h.classList.remove('open'));
  document.querySelectorAll('.week-body.open').forEach(b => b.classList.remove('open'));
  if (isOpening) {
    hdr.classList.add('open');
    body.classList.add('open');
  }
}

function scrollToWeek(id){
  const el=document.getElementById(id);
  if(!el) return;
  const hdr=el.querySelector('.week-header');
  const body=document.getElementById('body-'+id);
  if(!hdr.classList.contains('open')){ hdr.classList.add('open'); body.classList.add('open'); }
  el.scrollIntoView({behavior:'smooth',block:'start'});
  
  
}

let curPhase='all',curSearch='';
function filterPhase(p,btn){
  curPhase=p;
  document.querySelectorAll('.phase-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('search-box').value='';
  curSearch='';
  renderContent(p,'');
}

let st;
function doSearch(v){
  clearTimeout(st);
  st=setTimeout(()=>{
    curSearch=v.trim();
    if(curSearch){ curPhase='all'; document.querySelectorAll('.phase-tab').forEach(t=>t.classList.remove('active')); document.querySelector('.phase-tab').classList.add('active'); }
    renderContent(curPhase,curSearch);
  },200);
}

// INIT

renderContent();
setTimeout(()=>{
  const fh=document.querySelector('.week-header');
  if(fh){ toggleWeek(fh,fh.closest('.week-block').id); }
},100);
</script>
</body>
</html>
